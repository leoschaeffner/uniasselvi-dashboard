name: Atualizar Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'planilhas/**'   # só roda quando o Power Automate atualizar as planilhas
  workflow_dispatch:

concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependências
        run: pip install pandas openpyxl xlrd requests --quiet

      - name: Verificar planilhas
        run: |
          echo "=== Planilhas no repositório ==="
          ls -lh planilhas/ 2>/dev/null || echo "Pasta planilhas/ não encontrada"

      - name: Processar dashboard
        run: python processar.py --sem-browser

      - name: Publicar index.html
        run: |
          cp saida/dashboard.html index.html
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git diff --cached --quiet && echo "Sem mudanças" || \
            (git commit -m "Dashboard $(date '+%d/%m/%Y %H:%M')" && git push)
