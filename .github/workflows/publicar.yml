name: Atualizar Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo para evitar conflito no push

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependências
        run: pip install pandas openpyxl xlrd requests --quiet

      - name: Baixar planilhas do OneDrive
        env:
          URL_CONTROLE:  ${{ secrets.URL_CONTROLE }}
          URL_PORTFOLIO: ${{ secrets.URL_PORTFOLIO }}
          URL_GERENCIAL: ${{ secrets.URL_GERENCIAL }}
        run: |
          mkdir -p planilhas

          echo "[INFO] Baixando 01_CONTROLE_TUTORIA.xlsx..."
          curl -L --max-time 90 --retry 3 --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0" \
            -o planilhas/01_CONTROLE_TUTORIA.xlsx "$URL_CONTROLE"
          CTRL_SIZE=$(wc -c < planilhas/01_CONTROLE_TUTORIA.xlsx)
          echo "[INFO] Controle: $CTRL_SIZE bytes"
          if [ "$CTRL_SIZE" -lt 5000 ]; then
            echo "[ERRO] Arquivo inválido"; cat planilhas/01_CONTROLE_TUTORIA.xlsx; exit 1
          fi

          echo "[INFO] Baixando PORTIFOLIO_TUTOR.xlsx..."
          curl -L --max-time 90 --retry 3 --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0" \
            -o planilhas/PORTIFOLIO_TUTOR.xlsx "$URL_PORTFOLIO"
          PORT_SIZE=$(wc -c < planilhas/PORTIFOLIO_TUTOR.xlsx)
          echo "[INFO] Portfolio: $PORT_SIZE bytes"
          if [ "$PORT_SIZE" -lt 5000 ]; then
            echo "[ERRO] Arquivo inválido"; cat planilhas/PORTIFOLIO_TUTOR.xlsx; exit 1
          fi

          if [ -n "$URL_GERENCIAL" ]; then
            echo "[INFO] Baixando REL_GERAL_DE_GERENCIAMENTO.xlsx..."
            curl -L --max-time 90 --retry 3 --retry-delay 5 \
              -H "User-Agent: Mozilla/5.0" \
              -o planilhas/REL_GERAL_DE_GERENCIAMENTO.xlsx "$URL_GERENCIAL" || true
          fi

          echo "=== Planilhas baixadas ==="
          ls -lh planilhas/

      - name: Processar dashboard
        run: python processar.py --sem-browser

      - name: Publicar index.html
        run: |
          cp saida/dashboard.html index.html
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git diff --cached --quiet && echo "Sem mudancas" || (
            git commit -m "Dashboard $(date '+%d/%m/%Y %H:%M')"
            git pull --rebase origin main
            git push
          )
