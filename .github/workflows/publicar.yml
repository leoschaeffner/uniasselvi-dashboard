name: Atualizar Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Roda a cada 2 horas, 24h/dia, 7 dias/semana
    - cron: '0 */2 * * *'

# Só uma execução por vez — se chegar outra, cancela a anterior
concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependências
        run: pip install pandas openpyxl xlrd requests --quiet

      - name: Baixar planilhas do OneDrive
        env:
          URL_CONTROLE:  ${{ secrets.URL_CONTROLE }}
          URL_PORTFOLIO: ${{ secrets.URL_PORTFOLIO }}
          URL_GERENCIAL: ${{ secrets.URL_GERENCIAL }}
          URL_LOTACAO:   ${{ secrets.URL_LOTACAO }}
          URL_REL_NOVO:  ${{ secrets.URL_REL_NOVO }}
        run: |
          mkdir -p planilhas

          baixar() {
            local url="$1" dest="$2" obrig="$3"
            if [ -z "$url" ]; then
              echo "[AVISO] URL não configurada para $dest"
              [ "$obrig" = "sim" ] && exit 1 || return 0
            fi
            echo "[INFO] Baixando $dest..."
            curl -L --max-time 90 --retry 3 --retry-delay 5 \
              -H "User-Agent: Mozilla/5.0" -o "planilhas/$dest" "$url"
            SIZE=$(wc -c < "planilhas/$dest")
            echo "[INFO] $dest: $SIZE bytes"
            if [ "$SIZE" -lt 5000 ]; then
              echo "[ERRO] Arquivo muito pequeno — provavelmente HTML de erro"
              cat "planilhas/$dest"
              [ "$obrig" = "sim" ] && exit 1
            fi
          }

          baixar "$URL_CONTROLE"  "01_CONTROLE_TUTORIA.xlsx"            "sim"
          baixar "$URL_PORTFOLIO" "PORTIFOLIO_TUTOR.xlsx"               "sim"
          baixar "$URL_GERENCIAL" "REL_GERAL_DE_GERENCIAMENTO.xlsx"     "nao"
          baixar "$URL_LOTACAO"   "LOTACAO_TUTORES.xlsm"                "nao"
          baixar "$URL_REL_NOVO"  "REL_DETALHADO.csv"                   "nao"

          echo "=== Planilhas disponíveis ==="
          ls -lh planilhas/

      - name: Processar dashboard
        run: python processar.py --sem-browser

      - name: Publicar index.html
        run: |
          cp saida/dashboard.html index.html
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git diff --cached --quiet && echo "Sem mudancas" || {
            git commit -m "Dashboard $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') BRT"
            # Estratégia: em conflito de index.html, sempre usar a versão recém-gerada
            git pull --rebase -X ours origin main || {
              git rebase --abort
              git fetch origin main
              git reset --soft origin/main
              git add index.html
              git commit -m "Dashboard $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') BRT [retry]"
            }
            git push
          }

      # ── Manter repositório ativo (evita GitHub desativar o cron) ──────────
      - name: Keepalive — evitar desativação do cron
        if: github.event_name == 'schedule'
        run: |
          DAY=$(TZ='America/Sao_Paulo' date '+%u')  # 1=seg ... 7=dom
          if [ "$DAY" = "1" ]; then
            echo "Última execução automática: $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') BRT" > .github/last_run.txt
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add .github/last_run.txt
            git diff --cached --quiet || {
              git commit -m "keepalive $(date '+%Y-%m-%d')"
              git pull --rebase -X ours origin main
              git push
            }
          fi
