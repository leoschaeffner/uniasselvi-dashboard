name: Atualizar Dashboard

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pandas openpyxl xlrd requests --quiet

      - name: Baixar planilhas
        env:
          URL_CONTROLE:   ${{ secrets.URL_CONTROLE_TUTORIA }}
          URL_PORTFOLIO:  ${{ secrets.URL_PORTFOLIO_TUTOR }}
          URL_GIOCONDA:   ${{ secrets.URL_GIOCONDA }}
          URL_LOTACAO:    ${{ secrets.URL_LOTACAO }}
          URL_ALUNOS_HUB: ${{ secrets.URL_ALUNOS_HUB }}
        run: |
          mkdir -p planilhas
          baixar() {
            [ -z "$1" ] && echo "SKIP $3" && return
            URL=$(echo "$1" | grep -q '?' && echo "${1}&download=1" || echo "${1}?download=1")
            curl -sS -L -o "$2" -H "User-Agent: Mozilla/5.0" --max-time 180 "$URL"
            SIZE=$(stat -c%s "$2" 2>/dev/null || echo 0)
            [ "$SIZE" -gt "10000" ] && echo "OK $3 ($SIZE bytes)" || { echo "ERRO $3 ($SIZE bytes)"; rm -f "$2"; }
          }
          baixar "$URL_CONTROLE"   planilhas/01_CONTROLE_TUTORIA.xlsx        "CONTROLE_TUTORIA"
          baixar "$URL_PORTFOLIO"  planilhas/PORTIFOLIO_TUTOR.xlsx           "PORTFOLIO"
          baixar "$URL_GIOCONDA"   planilhas/REL_GERAL_DE_GERENCIAMENTO.xlsx "GIOCONDA"
          baixar "$URL_LOTACAO"    planilhas/LOTACAO_TUTORES.xlsm            "LOTACAO"
          baixar "$URL_ALUNOS_HUB" planilhas/Relatorio_alunos_por_hub.csv   "ALUNOS_HUB"
          ls -lh planilhas/

      - name: Gerar dashboard
        run: python3 processar.py --sem-browser

      - name: Publicar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp saida/dashboard.html index.html
          git add index.html
          git diff --cached --quiet || git commit -m "Dashboard $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') BRT" && git push
