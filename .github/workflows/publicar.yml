name: Atualizar Dashboard

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Baixar planilhas do OneDrive
        run: |
          mkdir -p planilhas
          echo "Baixando PORTIFOLIO_TUTOR.xlsx..."
          curl -L -o planilhas/PORTIFOLIO_TUTOR.xlsx "https://uniasselvi01-my.sharepoint.com/:x:/g/personal/leonardo_camargo_uniasselvi_com_br/IQAzXkKdX-d4RLvcWWfFPFnAAcW2md2Hd2hUoyeQEHVCrmQ?e=O4N8ve&download=1"
          echo "Baixando 01_CONTROLE_TUTORIA.xlsx..."
          curl -L -o planilhas/01_CONTROLE_TUTORIA.xlsx "https://uniasselvi01-my.sharepoint.com/:x:/g/personal/leonardo_camargo_uniasselvi_com_br/IQDD_AnC4zM3TJXM6lU1F6hvAY7Wx5-ILtt6SvVzK3ksYjE?e=BBHMeg&download=1"
          echo "=== Verificacao ==="
          ls -la planilhas/
          for f in planilhas/*.xlsx; do
            SIZE=$(stat --format=%s "$f")
            echo "$f: ${SIZE} bytes"
            if [ "$SIZE" -lt 5000 ]; then
              echo "ERRO: Arquivo muito pequeno"
              cat "$f"
              exit 1
            fi
          done
          echo "=== Downloads OK ==="

      - name: Processar
        run: python processar.py --sem-browser

      - name: Preparar deploy
        run: |
          cp saida/dashboard.html index.html
          echo "index.html pronto"

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
