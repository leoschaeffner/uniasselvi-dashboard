name: Atualizar Dashboard

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches: [main]
    paths:
      - 'planilhas/**'
      - 'template_dashboard.html'
      - 'processar.py'
      - 'catalogo_oficial.json'
      - 'Relatorio_alunos_por_hub.csv'
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Motivo da atualização manual'
        required: false
        default: 'Manual'

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas openpyxl xlrd requests --quiet

      # ── Download de todas as planilhas do OneDrive ────────────────────────────
      - name: Baixar planilhas do OneDrive
        env:
          URL_CONTROLE:    ${{ secrets.URL_CONTROLE_TUTORIA }}
          URL_PORTFOLIO:   ${{ secrets.URL_PORTFOLIO_TUTOR }}
          URL_GIOCONDA:    ${{ secrets.URL_GIOCONDA }}
          URL_LOTACAO:     ${{ secrets.URL_LOTACAO }}
          URL_ALUNOS_HUB:  ${{ secrets.URL_ALUNOS_HUB }}
        run: |
          mkdir -p planilhas
          
          baixar() {
            local URL="$1"
            local DEST="$2"
            local NOME="$3"
            if [ -z "$URL" ]; then
              echo "[SKIP] $NOME: secret não configurado"
              return
            fi
            # Converter link de compartilhamento OneDrive/SharePoint para download direto
            if echo "$URL" | grep -q "sharepoint.com"; then
              DL_URL="${URL}&download=1"
            elif echo "$URL" | grep -q "1drv.ms"; then
              DL_URL="${URL}&download=1"
            else
              DL_URL="$URL"
            fi
            echo "[INFO] Baixando $NOME..."
            HTTP=$(curl -sS -L -w "%{http_code}" -o "$DEST" \
              -H "User-Agent: Mozilla/5.0" \
              --max-time 180 --retry 2 "$DL_URL")
            SIZE=$(stat -c%s "$DEST" 2>/dev/null || echo 0)
            if [ "$HTTP" = "200" ] && [ "$SIZE" -gt "10000" ]; then
              echo "[INFO] $NOME: $SIZE bytes"
            else
              echo "[ERRO] $NOME: HTTP=$HTTP SIZE=$SIZE — verificar URL"
              rm -f "$DEST"
            fi
          }
          
          baixar "$URL_CONTROLE"   "planilhas/01_CONTROLE_TUTORIA.xlsx"         "01_CONTROLE_TUTORIA.xlsx"
          baixar "$URL_PORTFOLIO"  "planilhas/PORTIFOLIO_TUTOR.xlsx"             "PORTIFOLIO_TUTOR.xlsx"
          baixar "$URL_GIOCONDA"   "planilhas/REL_GERAL_DE_GERENCIAMENTO.xlsx"   "REL_GERAL_DE_GERENCIAMENTO.xlsx"
          baixar "$URL_LOTACAO"    "planilhas/LOTACAO_TUTORES.xlsm"              "LOTACAO_TUTORES.xlsm"
          baixar "$URL_ALUNOS_HUB" "planilhas/Relatorio_alunos_por_hub.csv"      "Relatorio_alunos_por_hub.csv"
          
          echo "=== Planilhas disponíveis ==="
          ls -lh planilhas/

      # ── Gerar dashboard ───────────────────────────────────────────────────────
      - name: Gerar dashboard
        run: python3 processar.py --sem-browser

      # ── Publicar no GitHub Pages ──────────────────────────────────────────────
      - name: Publicar no GitHub Pages
        run: |
          [ -f "saida/dashboard.html" ] || { echo "ERRO: saida/dashboard.html não gerado"; exit 1; }
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp saida/dashboard.html index.html
          git add index.html
          git diff --cached --quiet && echo "Sem mudanças" || \
            git commit -m "Dashboard $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') BRT" && git push
