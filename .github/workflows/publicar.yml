name: Atualizar Dashboard

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pandas openpyxl xlrd requests --quiet

      - name: Baixar planilhas
        env:
          # Tenta ambos os nomes possíveis de cada secret
          URL_CONTROLE:   ${{ secrets.URL_CONTROLE || secrets.URL_CONTROLE_TUTORIA }}
          URL_PORTFOLIO:  ${{ secrets.URL_PORTFOLIO || secrets.URL_PORTFOLIO_TUTOR }}
          URL_GIOCONDA:   ${{ secrets.URL_GIOCONDA }}
          URL_LOTACAO:    ${{ secrets.URL_LOTACAO }}
          URL_ALUNOS_HUB: ${{ secrets.URL_ALUNOS_HUB }}
        run: |
          mkdir -p planilhas
          python3 - << 'PYEOF'
          import os, urllib.request, re

          def baixar(env_var, destino, nome):
              url = os.environ.get(env_var, '').strip()
              if not url:
                  print(f"  SKIP {nome}: secret '{env_var}' vazio")
                  return False
              urls = []
              if 'sharepoint.com' in url:
                  sep = '&' if '?' in url else '?'
                  urls.append(url + sep + 'download=1')
                  m  = re.search(r'/([A-Za-z0-9_-]{20,})[?]', url)
                  b  = re.match(r'(https://[^/]+)', url)
                  u2 = re.search(r'/personal/([^/]+)/', url)
                  if m and b and u2:
                      urls.append(f"{b.group(1)}/personal/{u2.group(1)}/_layouts/15/download.aspx?share={m.group(1)}")
              else:
                  sep = '&' if '?' in url else '?'
                  urls.append(url + sep + 'download=1')
              urls.append(url)
              for u in urls:
                  try:
                      req = urllib.request.Request(u, headers={'User-Agent':'Mozilla/5.0'})
                      with urllib.request.urlopen(req, timeout=180) as r:
                          data = r.read()
                      if len(data) > 50000 and b'<!DOCTYPE' not in data[:300]:
                          open(destino,'wb').write(data)
                          print(f"  [OK] {nome}: {len(data):,} bytes")
                          return True
                      print(f"  [AVISO] {nome}: {len(data)} bytes (parece HTML) — próxima URL")
                  except Exception as e:
                      print(f"  [AVISO] {nome}: {e}")
              print(f"  [ERRO] {nome}: todas as URLs falharam")
              return False

          baixar('URL_CONTROLE',   'planilhas/01_CONTROLE_TUTORIA.xlsx',        '01_CONTROLE_TUTORIA')
          baixar('URL_PORTFOLIO',  'planilhas/PORTIFOLIO_TUTOR.xlsx',           'PORTIFOLIO_TUTOR')
          baixar('URL_GIOCONDA',   'planilhas/REL_GERAL_DE_GERENCIAMENTO.xlsx', 'REL_GERAL_GERENCIAMENTO')
          baixar('URL_LOTACAO',    'planilhas/LOTACAO_TUTORES.xlsm',            'LOTACAO_TUTORES')
          baixar('URL_ALUNOS_HUB', 'planilhas/Relatorio_alunos_por_hub.csv',   'ALUNOS_HUB')
          PYEOF
          echo "=== Planilhas ==="
          ls -lh planilhas/

      - name: Gerar dashboard
        run: python3 processar.py --sem-browser

      - name: Publicar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp saida/dashboard.html index.html
          git add index.html
          git diff --cached --quiet || (git commit -m "Dashboard $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') BRT" && git push)
